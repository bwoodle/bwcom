name: Deploy brentwoodle.com to AWS
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  python-checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install Python dependencies
        run: python -m pip install -e '.[dev]'
      - name: Check Python formatting
        run: python -m ruff format --check scripts
      - name: Lint Python
        run: python -m ruff check scripts
      - name: Type-check Python
        run: python -m mypy scripts/strava_pipeline scripts/strava_to_training_log.py scripts/strava_read_window.py
      - name: Run Python unit tests
        run: python -m pytest scripts/tests -q

  next-checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: bwcom-next
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bwcom-next/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Check formatting
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Run unit tests
        run: npm run test
      - name: Build Next.js app
        run: npm run build

  terraform-checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: prod
            working_directory: bwcom-terraform/env/prod
            tf_vars: >-
              -var=nextauth_secret=ci-placeholder-nextauth-secret
              -var=google_client_id=ci-placeholder-google-client-id
              -var=google_client_secret=ci-placeholder-google-client-secret
              -var=image_tag=ci-placeholder-image-tag
          - name: prod-data
            working_directory: bwcom-terraform/env/prod-data
            tf_vars: ""
          - name: test
            working_directory: bwcom-terraform/env/test
            tf_vars: >-
              -var=nextauth_secret=ci-placeholder-nextauth-secret
              -var=google_client_id=ci-placeholder-google-client-id
              -var=google_client_secret=ci-placeholder-google-client-secret
          - name: test-data
            working_directory: bwcom-terraform/env/test-data
            tf_vars: ""
    defaults:
      run:
        working-directory: ${{ matrix.working_directory }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: terraform init -backend=false -input=false
      - name: Terraform Validate
        run: terraform validate -no-color
      - name: Terraform Plan
        run: terraform plan -input=false -lock=false -refresh=false -no-color ${{ matrix.tf_vars }}

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Deploy image CDN stack (prod)
        run: |
          if aws cloudformation describe-stacks --region us-east-1 --stack-name bwcom-images-cdn-prod >/dev/null 2>&1; then
            STACK_STATUS=$(aws cloudformation describe-stacks \
              --region us-east-1 \
              --stack-name bwcom-images-cdn-prod \
              --query "Stacks[0].StackStatus" \
              --output text)

            if [[ "${STACK_STATUS}" == "ROLLBACK_COMPLETE" || "${STACK_STATUS}" == "ROLLBACK_FAILED" ]]; then
              aws cloudformation delete-stack --region us-east-1 --stack-name bwcom-images-cdn-prod
              aws cloudformation wait stack-delete-complete --region us-east-1 --stack-name bwcom-images-cdn-prod
            fi
          fi

          aws cloudformation deploy \
            --region us-east-1 \
            --stack-name bwcom-images-cdn-prod \
            --template-file cfn/bwcom-static/s3-cloudfront-stack/images-cdn.yml \
            --parameter-overrides BucketName=brentwoodle.com CreateDNS=false \
            --no-fail-on-empty-changeset
      - name: Read image CDN outputs
        run: |
          IMAGE_CDN_DOMAIN=$(aws cloudformation describe-stacks \
            --region us-east-1 \
            --stack-name bwcom-images-cdn-prod \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionDomainName'].OutputValue" \
            --output text)
          IMAGE_CDN_ARN=$(aws cloudformation describe-stacks \
            --region us-east-1 \
            --stack-name bwcom-images-cdn-prod \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionArn'].OutputValue" \
            --output text)

          if [[ -z "${IMAGE_CDN_DOMAIN}" || -z "${IMAGE_CDN_ARN}" ]]; then
            echo "Missing CloudFront outputs from bwcom-images-cdn-prod" >&2
            exit 1
          fi

          echo "IMAGE_CDN_BASE_URL=https://${IMAGE_CDN_DOMAIN}" >> "$GITHUB_ENV"
          echo "IMAGE_CDN_ARN=${IMAGE_CDN_ARN}" >> "$GITHUB_ENV"
      - name: Login to ECR
        run: aws ecr get-login-password --region us-west-2 | docker login --username AWS --password-stdin 685339315795.dkr.ecr.us-west-2.amazonaws.com
      - name: Build and Push Docker
        run: |
          SHA=${GITHUB_SHA}
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --build-arg NEXT_PUBLIC_IMAGES_BASE_URL=${IMAGE_CDN_BASE_URL} \
            -t 685339315795.dkr.ecr.us-west-2.amazonaws.com/bwcom-next:${SHA} \
            -t 685339315795.dkr.ecr.us-west-2.amazonaws.com/bwcom-next:latest \
            ./bwcom-next --push
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init (prod-data)
        run: terraform init
        working-directory: bwcom-terraform/env/prod-data
      - name: Terraform Apply (prod-data)
        run: terraform apply -auto-approve -var='images_cloudfront_distribution_arns=["'"${IMAGE_CDN_ARN}"'"]'
        working-directory: bwcom-terraform/env/prod-data
      - name: Sync images to S3
        run: ./scripts/sync-images.sh brentwoodle.com
      - name: Smoke test image CDN
        run: |
          URL="${IMAGE_CDN_BASE_URL}/web-content/thumbs/1.jpg"
          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" "$URL")
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "Image CDN smoke test failed: $URL returned $HTTP_CODE" >&2
            exit 1
          fi
      - name: Terraform Init
        run: terraform init
        working-directory: bwcom-terraform/env/prod
      - name: Terraform Plan
        run: terraform plan
        working-directory: bwcom-terraform/env/prod
        env:
          TF_VAR_nextauth_secret: ${{ secrets.NEXTAUTH_SECRET }}
          TF_VAR_nextauth_url: https://brentwoodle.com
          TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TF_VAR_image_tag: ${{ github.sha }}
      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: bwcom-terraform/env/prod
        env:
          TF_VAR_nextauth_secret: ${{ secrets.NEXTAUTH_SECRET }}
          TF_VAR_nextauth_url: https://brentwoodle.com
          TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TF_VAR_image_tag: ${{ github.sha }}
