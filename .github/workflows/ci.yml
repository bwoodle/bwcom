name: Deploy brentwoodle.com to AWS
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-next:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: bwcom-next
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bwcom-next/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build Next.js app
        run: npm run build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Deploy image CDN stack (prod)
        run: |
          aws cloudformation deploy \
            --region us-east-1 \
            --stack-name bwcom-images-cdn-prod \
            --template-file cfn/bwcom-static/s3-cloudfront-stack/images-cdn.yml \
            --parameter-overrides BucketName=brentwoodle.com CreateDNS=false
      - name: Read image CDN outputs
        run: |
          IMAGE_CDN_DOMAIN=$(aws cloudformation describe-stacks \
            --region us-east-1 \
            --stack-name bwcom-images-cdn-prod \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionDomainName'].OutputValue" \
            --output text)
          IMAGE_CDN_ARN=$(aws cloudformation describe-stacks \
            --region us-east-1 \
            --stack-name bwcom-images-cdn-prod \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionArn'].OutputValue" \
            --output text)

          if [[ -z "${IMAGE_CDN_DOMAIN}" || -z "${IMAGE_CDN_ARN}" ]]; then
            echo "Missing CloudFront outputs from bwcom-images-cdn-prod" >&2
            exit 1
          fi

          echo "IMAGE_CDN_BASE_URL=https://${IMAGE_CDN_DOMAIN}" >> "$GITHUB_ENV"
          echo "IMAGE_CDN_ARN=${IMAGE_CDN_ARN}" >> "$GITHUB_ENV"
      - name: Login to ECR
        run: aws ecr get-login-password --region us-west-2 | docker login --username AWS --password-stdin 685339315795.dkr.ecr.us-west-2.amazonaws.com
      - name: Build and Push Docker
        run: |
          SHA=${GITHUB_SHA}
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --build-arg NEXT_PUBLIC_IMAGES_BASE_URL=${IMAGE_CDN_BASE_URL} \
            -t 685339315795.dkr.ecr.us-west-2.amazonaws.com/bwcom-next:${SHA} \
            -t 685339315795.dkr.ecr.us-west-2.amazonaws.com/bwcom-next:latest \
            ./bwcom-next --push
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init (prod-data)
        run: terraform init
        working-directory: bwcom-terraform/env/prod-data
      - name: Terraform Apply (prod-data)
        run: terraform apply -auto-approve
        working-directory: bwcom-terraform/env/prod-data
        env:
          TF_VAR_images_cloudfront_distribution_arns: '["${{ env.IMAGE_CDN_ARN }}"]'
      - name: Sync images to S3
        run: ./scripts/sync-images.sh brentwoodle.com
      - name: Terraform Init
        run: terraform init
        working-directory: bwcom-terraform/env/prod
      - name: Terraform Plan
        run: terraform plan
        working-directory: bwcom-terraform/env/prod
        env:
          TF_VAR_nextauth_secret: ${{ secrets.NEXTAUTH_SECRET }}
          TF_VAR_nextauth_url: https://brentwoodle.com
          TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TF_VAR_image_tag: ${{ github.sha }}
      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: bwcom-terraform/env/prod
        env:
          TF_VAR_nextauth_secret: ${{ secrets.NEXTAUTH_SECRET }}
          TF_VAR_nextauth_url: https://brentwoodle.com
          TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TF_VAR_image_tag: ${{ github.sha }}